<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b06ab3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b3fa0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6a2d82;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="200" rx="12" fill="url(#grad)"/>
  <!-- TIPTON text -->
  <text x="250" y="100" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="3">TIPTON</text>
  <!-- Power icon in the O -->
  <circle cx="322" cy="72" r="18" fill="none" stroke="#2ecc71" stroke-width="4"/>
  <line x1="322" y1="52" x2="322" y2="68" stroke="#2ecc71" stroke-width="4" stroke-linecap="round"/>
  <!-- ELECTRONICS text -->
  <text x="250" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" letter-spacing="10">ELECTRONICS</text>
  <!-- Green underline -->
  <rect x="80" y="152" width="340" height="3" rx="1.5" fill="#2ecc71"/>
</svg>
